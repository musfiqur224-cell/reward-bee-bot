<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward Bee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-900 text-white font-sans pb-28">
    <div id="app" v-cloak>
        
        <!-- Top Bar -->
        <div class="bg-slate-800 p-4 flex justify-between items-center border-b border-slate-700 sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-green-500 rounded-lg flex items-center justify-center shadow-lg shadow-green-500/20">
                    <i class="fa-solid fa-bee text-slate-900"></i>
                </div>
                <span class="font-bold text-lg">Reward Bee</span>
            </div>
            <div class="bg-slate-900 px-4 py-1.5 rounded-full border border-green-500/30 flex items-center gap-2">
                <i class="fa-solid fa-coins text-yellow-400"></i>
                <span class="font-bold text-green-400 text-sm">৳{{ user.balance }}</span>
            </div>
        </div>

        <!-- Home Page -->
        <div v-if="activePage === 'home'" class="p-5 space-y-6">
            <div class="bg-gradient-to-br from-green-600 to-green-800 p-6 rounded-3xl shadow-xl">
                <h2 class="text-xl font-bold">হ্যালো, {{ user.name }}!</h2>
                <p class="text-green-100 text-xs">আজকের টাস্ক কমপ্লিট করে আয় করুন।</p>
            </div>

            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700/50">
                    <p class="text-slate-400 text-[10px] uppercase font-bold">ইউজার আইডি</p>
                    <p class="text-sm font-black">{{ user.id }}</p>
                </div>
                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700/50">
                    <p class="text-slate-400 text-[10px] uppercase font-bold">ব্যালেন্স</p>
                    <p class="text-xl font-black">৳{{ user.balance }}</p>
                </div>
            </div>

            <button @click="startTask" class="w-full bg-green-500 hover:bg-green-600 py-4 rounded-2xl font-bold text-lg shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fa-solid fa-bolt"></i> কাজ শুরু করুন
            </button>
        </div>

        <!-- Payment Page -->
        <div v-if="activePage === 'payments'" class="p-5 space-y-5">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <h3 class="text-green-500 font-bold text-lg mb-4">টাকা উত্তোলন</h3>
                <div class="space-y-4">
                    <select v-model="withdrawMethod" class="w-full bg-slate-900 p-3.5 rounded-xl border border-slate-700 outline-none">
                        <option value="" disabled>মেথড সিলেক্ট করুন</option>
                        <option value="Bkash">বিকাশ</option>
                        <option value="Nagad">নগদ</option>
                    </select>
                    <input type="number" v-model="withdrawNum" placeholder="নাম্বার" class="w-full bg-slate-900 p-3.5 rounded-xl border border-slate-700">
                    <input type="number" v-model="withdrawAmt" placeholder="পরিমাণ (মিনিমাম ৫০০)" class="w-full bg-slate-900 p-3.5 rounded-xl border border-slate-700">
                    <button @click="handleWithdraw" class="w-full bg-blue-600 py-4 rounded-xl font-bold">রিকোয়েস্ট পাঠান</button>
                </div>
            </div>
        </div>

        <!-- Task Overlay -->
        <div v-if="activePage === 'task'" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center p-6 text-center">
             <div class="text-6xl font-black mb-4 text-green-500">{{ timer }}s</div>
             <h3 class="text-xl font-bold">অ্যাড লোড হচ্ছে...</h3>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 w-full bg-slate-800/95 backdrop-blur-md flex justify-around pt-3 pb-8 border-t border-slate-700 z-50">
            <button @click="activePage = 'home'" :class="activePage === 'home' ? 'text-green-500' : 'text-slate-500'" class="flex flex-col items-center gap-1">
                <i class="fa-solid fa-house-chimney text-xl"></i><span>হোম</span>
            </button>
            <button @click="activePage = 'payments'" :class="activePage === 'payments' ? 'text-green-500' : 'text-slate-500'" class="flex flex-col items-center gap-1">
                <i class="fa-solid fa-wallet text-xl"></i><span>পেমেন্ট</span>
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const tg = window.Telegram.WebApp;
                const activePage = ref('home');
                const timer = ref(10);
                const user = ref({ id: '...', name: 'Loading...', balance: 0 });

                const withdrawMethod = ref('');
                const withdrawNum = ref('');
                const withdrawAmt = ref('');

                onMounted(async () => {
                    tg.expand();
                    const tgUser = tg.initDataUnsafe.user;
                    if (tgUser) {
                        try {
                            const res = await fetch(`/api/get_user/${tgUser.id}`);
                            const data = await res.json();
                            if (data.status === "success") {
                                user.value = { id: data.user_id, name: data.name, balance: data.balance };
                            }
                        } catch (e) { console.error("Error loading user", e); }
                    }
                });

                const startTask = () => {
                    activePage.value = 'task';
                    let interval = setInterval(() => {
                        timer.value--;
                        if (timer.value <= 0) {
                            clearInterval(interval);
                            user.value.balance += 5;
                            alert("৳৫ যোগ হয়েছে!");
                            timer.value = 10;
                            activePage.value = 'home';
                        }
                    }, 1000);
                };

                const handleWithdraw = () => {
                    if (withdrawAmt.value < 500) return alert("মিনিমাম ৫০০ ৳ লাগবে!");
                    alert("অনুরোধ সফল!");
                    user.value.balance -= withdrawAmt.value;
                };

                return { activePage, user, timer, withdrawMethod, withdrawNum, withdrawAmt, startTask, handleWithdraw }
            }
        }).mount('#app');
    </script>
</body>
</html>
