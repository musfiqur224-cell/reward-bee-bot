<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward Bee - Earn & Refer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        [v-cloak] { display: none; }
        .nav-shadow { box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.3); }
        .iframe-overlay { position: fixed; inset: 0; background: #000; z-index: 200; }
        .task-header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 250; width: 90%; display: flex; justify-content: center; 
        }
        .disabled-btn { opacity: 0.5; pointer-events: none; grayscale: 1; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans pb-28">
    <div id="app" v-cloak>
        
        <!-- Header -->
        <div class="bg-slate-800 p-4 flex justify-between items-center border-b border-slate-700 sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-green-500 rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-bee text-slate-900"></i>
                </div>
                <span class="font-bold text-lg tracking-tight">Reward Bee</span>
            </div>
            <div class="bg-slate-900 px-4 py-1.5 rounded-full border border-green-500/30 flex items-center gap-2 shadow-inner">
                <i class="fa-solid fa-coins text-yellow-400"></i>
                <span class="font-bold text-green-400 text-sm">৳{{ user.balance }}</span>
            </div>
        </div>

        <!-- Home Page -->
        <div v-if="activePage === 'home'" class="p-5 space-y-6">
            <div class="bg-gradient-to-br from-green-600 to-green-800 p-6 rounded-3xl shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-xl font-bold mb-1">হ্যালো, {{ user.name }}!</h2>
                    <p class="text-green-100 text-xs opacity-80">আজকের টাস্ক কমপ্লিট করে আয় বাড়ান।</p>
                </div>
                <i class="fa-solid fa-bolt absolute -right-4 -bottom-4 text-8xl text-white/10"></i>
            </div>

            <!-- Limits -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700/50 text-center">
                    <p class="text-slate-400 text-[10px] uppercase font-bold mb-1">ঘণ্টার লিমিট</p>
                    <p class="text-xl font-black text-white">{{ h_count }}/{{ config.hourly }}</p>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700/50 text-center">
                    <p class="text-slate-400 text-[10px] uppercase font-bold mb-1">দৈনিক লিমিট</p>
                    <p class="text-xl font-black text-white">{{ d_count }}/{{ config.daily }}</p>
                </div>
            </div>

            <!-- Action Button -->
            <button @click="startTask" 
                :disabled="h_count >= config.hourly || d_count >= config.daily"
                :class="{'disabled-btn': h_count >= config.hourly || d_count >= config.daily}"
                class="w-full bg-green-500 py-4 rounded-2xl font-bold text-lg shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fa-solid fa-bolt"></i> 
                {{ h_count >= config.hourly ? 'লিমিট শেষ!' : 'কাজ শুরু করুন' }}
            </button>
        </div>

        <!-- Payments Page -->
        <div v-if="activePage === 'payments'" class="p-5">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 text-center">
                <i class="fa-solid fa-wallet text-4xl text-green-500 mb-4"></i>
                <h3 class="font-bold">উত্তোলন সিস্টেম শীঘ্রই আসছে</h3>
            </div>
        </div>

        <!-- Profile Page -->
        <div v-if="activePage === 'profile'" class="p-5">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 text-center">
                <div class="w-16 h-16 bg-slate-700 rounded-full mx-auto mb-3 flex items-center justify-center text-2xl border border-green-500/30">
                    <i class="fa-solid fa-user text-green-500"></i>
                </div>
                <h3 class="font-bold text-lg">{{ user.name }}</h3>
                <p class="text-slate-400 text-xs">ID: {{ user.id }}</p>
            </div>
        </div>

        <!-- Task Overlay (iFrame) -->
        <div v-if="isTaskRunning" class="iframe-overlay">
            <div class="task-header">
                <div v-if="timer > 0" class="bg-red-600 text-white px-8 py-2.5 rounded-full font-bold shadow-2xl border border-white/20">
                    অপেক্ষা করুন: {{ timer }}s
                </div>
                <button v-else-if="!isClaiming" @click="claimReward" class="bg-green-500 text-white px-10 py-2.5 rounded-full font-black shadow-2xl animate-bounce border border-white/20">
                    রিওয়ার্ড নিন [X]
                </button>
                <div v-else class="bg-green-700 text-white px-8 py-2.5 rounded-full font-bold">
                    লোডিং...
                </div>
            </div>
            <iframe :src="currentLink"></iframe>
        </div>

        <!-- Footer Nav -->
        <div class="fixed bottom-0 w-full bg-slate-800/95 backdrop-blur-md flex justify-around pt-3 pb-8 border-t border-slate-700 nav-shadow z-50">
            <button @click="activePage = 'home'" :class="activePage === 'home' ? 'text-green-500' : 'text-slate-500'" class="flex flex-col items-center gap-1 text-[10px]">
                <i class="fa-solid fa-house-chimney text-xl"></i><span>হোম</span>
            </button>
            <button @click="activePage = 'payments'" :class="activePage === 'payments' ? 'text-green-500' : 'text-slate-500'" class="flex flex-col items-center gap-1 text-[10px]">
                <i class="fa-solid fa-money-bill-transfer text-xl"></i><span>পেমেন্ট</span>
            </button>
            <button @click="activePage = 'profile'" :class="activePage === 'profile' ? 'text-green-500' : 'text-slate-500'" class="flex flex-col items-center gap-1 text-[10px]">
                <i class="fa-solid fa-user text-xl"></i><span>প্রোফাইল</span>
            </button>
        </div>

    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const tg = window.Telegram.WebApp;
                const activePage = ref('home');
                const user = ref({ id: '', name: '', balance: 0 });
                const config = ref({ links: [], reward: 5, hourly: 5, daily: 50 });
                const isTaskRunning = ref(false);
                const isClaiming = ref(false);
                const currentLink = ref('');
                const timer = ref(10);
                const h_count = ref(0);
                const d_count = ref(0);

                const loadData = async () => {
                    tg.ready();
                    tg.expand();
                    try {
                        // ১. কনফিগ লোড
                        const cfgRes = await fetch('/api/config');
                        config.value = await cfgRes.json();
                        
                        // ২. ইউজার ডাটা লোড
                        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "12345";
                        user.value.name = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "User";
                        
                        const userRes = await fetch(`/api/user/${userId}`);
                        const userData = await userRes.json();
                        
                        user.value.id = userData.id;
                        user.value.balance = userData.balance;
                        h_count.value = userData.hourly_done; // ব্যাকেন্ড থেকে আসা সঠিক ডাটা
                        d_count.value = userData.daily_done;
                    } catch(e) { console.error("Sync Error"); }
                };

                onMounted(loadData);

                const startTask = () => {
                    if (h_count.value >= config.value.hourly) return tg.showAlert("ঘণ্টার লিমিট শেষ!");
                    currentLink.value = config.value.links[Math.floor(Math.random() * config.value.links.length)];
                    isTaskRunning.value = true;
                    timer.value = 10;
                    isClaiming.value = false;
                    const interval = setInterval(() => {
                        if (timer.value > 0) timer.value--;
                        else clearInterval(interval);
                    }, 1000);
                };

                const claimReward = async () => {
                    if (isClaiming.value) return;
                    isClaiming.value = true;
                    try {
                        const res = await fetch('/api/update_balance', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId: user.value.id, amount: config.value.reward })
                        });
                        const data = await res.json();
                        if (data.success) {
                            user.value.balance = data.balance;
                            h_count.value = data.hourly_done; // ব্যাকেন্ড থেকে আপডেট নিয়ে আসা
                            d_count.value = data.daily_done;
                            isTaskRunning.value = false;
                            tg.showAlert(`৳${config.value.reward} সফলভাবে যোগ হয়েছে!`);
                        }
                    } catch (e) { 
                        isClaiming.value = false;
                        tg.showAlert("নেটওয়ার্ক সমস্যা!");
                    }
                };

                return { activePage, user, config, isTaskRunning, isClaiming, currentLink, timer, h_count, d_count, startTask, claimReward }
            }
        }).mount('#app');
    </script>
</body>
</html>
